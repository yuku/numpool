name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
      contents: read
    strategy:
      matrix:
        postgres-version: ['14', '15', '16']
      fail-fast: false
    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
          POSTGRES_INITDB_ARGS: --no-sync
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --tmpfs /var/lib/postgresql/data:rw,noexec,nosuid,size=1024m

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Configure PostgreSQL max connections
      run: |
        echo "🔍 Checking current PostgreSQL configuration..."
        PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres -c "SHOW max_connections;"
        PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres -c "SHOW shared_buffers;"
        
        echo "🛠️ Modifying postgresql.conf with sed to replace existing values..."
        # Use sed to replace the existing max_connections and shared_buffers values
        docker exec ${{ job.services.postgres.id }} bash -c "
          # Backup the original config
          cp /var/lib/postgresql/data/postgresql.conf /var/lib/postgresql/data/postgresql.conf.backup
          
          # Replace the existing settings
          sed -i 's/^max_connections = [0-9]*/max_connections = 200/' /var/lib/postgresql/data/postgresql.conf
          sed -i 's/^shared_buffers = [0-9A-Za-z]*/shared_buffers = 256MB/' /var/lib/postgresql/data/postgresql.conf
          
          # If the settings were commented out, add them explicitly
          if ! grep -q '^max_connections = 200' /var/lib/postgresql/data/postgresql.conf; then
            echo 'max_connections = 200' >> /var/lib/postgresql/data/postgresql.conf
          fi
          if ! grep -q '^shared_buffers = 256MB' /var/lib/postgresql/data/postgresql.conf; then
            echo 'shared_buffers = 256MB' >> /var/lib/postgresql/data/postgresql.conf
          fi
        "
        
        echo "📝 Verifying configuration changes:"
        docker exec ${{ job.services.postgres.id }} grep -E "max_connections|shared_buffers" /var/lib/postgresql/data/postgresql.conf
        
        echo "🔄 Restarting PostgreSQL to apply configuration..."
        docker restart ${{ job.services.postgres.id }}
        
        echo "⏳ Waiting for PostgreSQL to restart..."
        sleep 10
        until pg_isready -h localhost -p 5432 -U postgres; do
          echo "Still waiting for PostgreSQL to restart..."
          sleep 3
        done
        echo "✅ PostgreSQL restarted successfully"

    - name: Verify PostgreSQL configuration
      run: |
        echo "🔍 Verifying PostgreSQL max_connections setting..."
        PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres -c "SHOW max_connections;"
        PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres -c "SHOW shared_buffers;"
        
        # Check that max_connections is actually set to a high value
        MAX_CONN=$(PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres -t -c "SHOW max_connections;" | xargs)
        echo "📊 Current max_connections: $MAX_CONN"
        
        # Verify it's at least 200 (should be 10000 based on the sed command)
        if [ "$MAX_CONN" -lt "200" ]; then
          echo "❌ ERROR: max_connections is too low, got: $MAX_CONN (expected >= 200)"
          exit 1
        fi
        echo "✅ PostgreSQL max_connections successfully configured: $MAX_CONN"

    - name: Run main tests
      run: go test -json -race -timeout 30s ./... | go tool tparse -all

  golangci:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
